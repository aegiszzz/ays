name: Supabase Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Sync migration history
        run: |
          # All migrations before 20260422 were applied directly to the DB
          # (SQL Editor / manual) but never tracked by the Supabase CLI.
          # Mark them as applied so db push only runs the new migrations.
          VERSIONS=$(ls supabase/migrations/*.sql \
            | grep -oP '(?<=/)\d+(?=_)' \
            | grep -v '^20260422' \
            | sort | tr '\n' ' ')
          supabase migration repair --status applied $VERSIONS \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }} || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: supabase functions deploy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
