            20251222113153 \
            20251222114006 \
            20251222114317 \
            20251222114455 \
            20251222141744 \
            20251222150628 \
            20251225132150 \
            20260318000000 \
            20260320000000 \
            20260321000000 \
            20260321000001 \
            20260321000002 \
            20260409000001; do
            supabase migration repair --status applied "$version" || echo "Warning: repair failed for $version (may already be applied)"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run new migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: supabase functions deploy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
